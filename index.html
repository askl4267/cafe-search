<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>大阪カフェ検索</title>

  <!-- Google Fonts：本文は丸めの日本語サンセリフ、見出しはクラシックなセリフ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Shippori+Mincho:wght@600;700&display=swap" rel="stylesheet">

  <style>
    /* 紙のような質感（ノイズ＋グラデ） */
    body::before{
      content:"";
      position:fixed; inset:0;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(167,127,87,.08), transparent 60%),
        radial-gradient(1000px 600px at 120% 10%, rgba(122,160,136,.06), transparent 60%),
        linear-gradient(180deg, #fff8ee, #fff1db 85%);
      z-index:-2;
    }
    body::after{
      /* 細かい紙ノイズ */
      content:""; position:fixed; inset:0; z-index:-1; opacity:.25; pointer-events:none;
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity=".06"/></svg>');
      background-size: 220px 220px;
      mix-blend-mode:multiply;
    }
    .thumb { aspect-ratio: 4 / 3; object-fit: cover; }
    .skeleton { background: linear-gradient(90deg,#f1e6d9 25%,#fff3e3 37%,#f1e6d9 63%); background-size:400% 100%; animation:shimmer 1.1s infinite; border-radius:16px }
    @keyframes shimmer { 0%{background-position:100% 0} 100%{background-position:-100% 0} }
  </style>
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="text-coffee-900 font-sans" data-api-base="https://cafe-search-api.askl4267.workers.dev">
  <!-- Header -->
  <header class="sticky top-0 z-50 bg-cream-100/80 backdrop-blur border-b border-coffee-200" role="banner">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-coffee-600" aria-hidden="true"></div>
        <div class="font-display text-2xl tracking-wide">Osaka Cafe Finder</div>
      </div>
      <div id="headerSummary" class="ml-4 text-sm text-coffee-600 hidden md:block" aria-live="polite"></div>
      <div class="ml-auto text-xs text-coffee-500">Powered by Hot Pepper</div>
    </div>
  </header>

  <!-- Hero / 検索フォーム領域 -->
  <section class="border-b border-coffee-100" aria-labelledby="heroTitle">
    <div class="max-w-7xl mx-auto px-4 py-8 sm:py-12">
      <h1 id="heroTitle" class="font-display text-3xl sm:text-4xl text-coffee-800">今日はどんなカフェ気分？</h1>
      <p class="text-coffee-700/80 mt-2">エリア・駐車・禁煙で絞って、雰囲気の合うお店を見つけよう。</p>

      <!-- Filter card（検索フォームはこのコンテナ内に保持） -->
      <div class="mt-6 bg-cream-50/70 border border-coffee-200 rounded-2xl shadow-card p-4 sm:p-6">

        <!-- ▼ エリア選択（中→小ツリー） -->
        <section class="bg-cream-100/60 border border-cream-200 rounded-2xl p-4" aria-labelledby="areaTitle">
          <h2 id="areaTitle" class="text-coffee-800 font-semibold mb-2">エリア</h2>

          <!-- 中エリア（横並びチップ） -->
          <div id="midChips" class="flex flex-wrap gap-2 mb-3" role="group" aria-label="中エリア"></div>

          <!-- 小エリア（中エリア未選択のときは非表示） -->
          <div id="smallWrapper" class="space-y-3 hidden">
            <div class="text-sm text-coffee-700 font-semibold">小エリア</div>
            <div id="smallPanels" class="space-y-3"></div>
          </div>

          <!-- ハード条件 -->
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-4">
            <label class="block">
              <span class="text-sm text-coffee-700">駐車</span>
              <select id="parking" class="w-full rounded-xl border border-cream-300 bg-white p-2" aria-label="駐車">
                <option value="any">指定なし</option>
                <option value="has">あり</option>
                <option value="none">なし</option>
              </select>
            </label>
            <label class="block">
              <span class="text-sm text-coffee-700">禁煙</span>
              <select id="smoking" class="w-full rounded-xl border border-cream-300 bg-white p-2" aria-label="禁煙">
                <option value="any">指定なし</option>
                <option value="non_smoking">全面禁煙</option>
                <option value="has_non_smoking">禁煙席あり</option>
              </select>
            </label>
            <div class="flex items-end">
              <button id="search" class="w-full bg-coffee-600 hover:bg-coffee-700 text-white rounded-xl py-2" type="button">
                検索する
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </section>

  <section class="max-w-7xl mx-auto px-4 mt-6">
    <!-- ▼ 件数（上部に表示） -->
    <!-- <p id="summaryTop" class="text-sm text-coffee-700/80 mb-2" aria-live="polite">該当: 0 件</p>　-->

    <!-- ▼ カード -->
    <div id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" aria-live="polite" aria-busy="false"></div>

    <!-- ▼ ページャ（下部） -->
    <nav id="pager" class="mt-6 flex items-center justify-center gap-2" aria-label="ページ切替"></nav>
  </section>

  <!-- エラートースト -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 hidden bg-red-600 text-white text-sm px-4 py-2 rounded-xl shadow-lg" role="alert"></div>

<script>
(() => {
  // =============================
  // ユーティリティ
  // =============================
  const qs  = (sel, root = document) => root.querySelector(sel);
  const qsa = (sel, root = document) => Array.from(root.querySelectorAll(sel));
  const createEl = (tag, props = {}, children = []) => {
    const el = document.createElement(tag);
    Object.entries(props).forEach(([k, v]) => {
      if (k === 'class') el.className = v;
      else if (k === 'dataset') Object.assign(el.dataset, v);
      else if (k in el) el[k] = v; else el.setAttribute(k, v);
    });
    [].concat(children).filter(Boolean).forEach(ch => el.appendChild(typeof ch === 'string' ? document.createTextNode(ch) : ch));
    return el;
  };
  const fmt = (n) => new Intl.NumberFormat('ja-JP').format(n);
  const showToast = (msg) => {
    const t = qs('#toast');
    t.textContent = msg; t.classList.remove('hidden');
    window.clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => t.classList.add('hidden'), 4000);
  };

  // =============================
  // 定数と状態
  // =============================
  const API_BASE = document.body.dataset.apiBase || 'https://cafe-search-api.askl4267.workers.dev';

  // API呼び出しのキャンセル制御用
  let searchAborter = null;
  let countAborter  = null;

  // マスタと選択状態
  /** @type {{code:string,name:string}[]} */
  let middleMaster = [];
  /** @type {{code:string,name:string, middle:string}[]} */
  let smallMaster  = [];

  const state = {
    // 選択状態（集合）
    midsSelected:  new Set(),   // 中エリア
    smallSelected: new Set(),   // 小エリア
    // ハード条件
    parking: 'any',
    smoking: 'any',
    // ページング
    page: 1,
  };

  // =============================
  // URL <-> 状態 同期
  // =============================
  const readStateFromURL = () => {
    const url = new URL(location.href);
    const g = (key, fallback) => url.searchParams.get(key) ?? fallback;
    state.parking = g('parking', state.parking);
    state.smoking = g('smoking', state.smoking);
    state.page    = parseInt(g('page', String(state.page)), 10) || 1;
    const mids = g('middle', '');
    const small = g('small', '');
    state.midsSelected  = new Set(mids ? mids.split(',') : []);
    state.smallSelected = new Set(small ? small.split(',') : []);
  };

  const writeStateToURL = () => {
    const url = new URL(location.href);
    const sp = url.searchParams;
    sp.set('parking', state.parking);
    sp.set('smoking', state.smoking);
    sp.set('page', String(state.page));
    state.midsSelected.size  ? sp.set('middle', [...state.midsSelected].join(',')) : sp.delete('middle');
    state.smallSelected.size ? sp.set('small',  [...state.smallSelected].join(',')) : sp.delete('small');
    history.replaceState(null, '', url);
  };

  // =============================
  // API 呼び出し
  // =============================
  /** 件数APIを叩いて {midMap, smallMap} を返す */
  async function fetchAreaCounts() {
    // 既存のリクエストを中断
    if (countAborter) countAborter.abort();
    countAborter = new AbortController();

    const qsObj = new URLSearchParams({ parking: state.parking, smoking: state.smoking });
    if (state.midsSelected.size) qsObj.set('middle', [...state.midsSelected].join(','));

    const r = await fetch(`${API_BASE}/area_counts?${qsObj}`, { signal: countAborter.signal });
    if (!r.ok) throw new Error(`/area_counts ${r.status}`);
    const j = await r.json();
    return {
      midMap:   new Map((j.middle || []).map(({ code, cnt }) => [code, cnt])),
      smallMap: new Map((j.small  || []).map(({ code, cnt }) => [code, cnt])),
    };
  }

  /** 検索API */
  async function fetchSearch(page = 1) {
    // 既存のリクエストを中断
    if (searchAborter) searchAborter.abort();
    searchAborter = new AbortController();

    const sp = new URLSearchParams({
      page: String(page),
      parking: state.parking,
      smoking: state.smoking,
    });
    if (state.midsSelected.size)  sp.set('middle', [...state.midsSelected].join(','));
    if (state.smallSelected.size) sp.set('small',  [...state.smallSelected].join(','));

    const url = `${API_BASE}/search?${sp}`;
    const r = await fetch(url, { signal: searchAborter.signal });
    if (!r.ok) throw new Error(`/search ${r.status}`);
    return r.json();
  }

  // =============================
  // レンダリング
  // =============================
  function setLoadingCards(count = 6) {
    const grid = qs('#cards');
    grid.setAttribute('aria-busy', 'true');
    grid.innerHTML = '';
    for (let i = 0; i < count; i++) {
      grid.appendChild(createEl('div', { class: 'skeleton h-[220px] rounded-2xl' }));
    }
  }

  async function renderMidChips() {
    try {
      const { midMap } = await fetchAreaCounts();
      const box = qs('#midChips');
      box.innerHTML = '';

      middleMaster.forEach((m) => {
        const selected = state.midsSelected.has(m.code);
        const cnt = midMap.get(m.code) || 0;
        const btn = createEl('button', {
          type: 'button',
          role: 'switch',
          'aria-checked': String(selected),
          class:
            'px-3 py-1.5 rounded-full border text-sm transition ' +
            (selected
              ? 'bg-coffee-700 text-white border-coffee-700'
              : 'border-coffee-200 text-coffee-800 hover:bg-cream-200/60'),
        }, `${m.name}${cnt ? `（${fmt(cnt)}）` : ''}`);

        btn.addEventListener('click', async () => {
          selected ? state.midsSelected.delete(m.code) : state.midsSelected.add(m.code);
          // 中エリア変更時は小エリア選択を一旦クリア（片落ち防止）
          state.smallSelected.clear();
          await renderMidChips();
          await renderSmallPanels();
        });
        box.appendChild(btn);
      });
    } catch (err) {
      console.error(err);
      showToast('エリア件数の取得に失敗しました');
    }
  }

  async function renderSmallPanels() {
    const smallWrapper = qs('#smallWrapper');
    const wrap = qs('#smallPanels');

    // 中エリア未選択 → 非表示
    if (!state.midsSelected.size) {
      wrap.innerHTML = '';
      smallWrapper.classList.add('hidden');
      return;
    }
    smallWrapper.classList.remove('hidden');

    try {
      const { smallMap } = await fetchAreaCounts();
      wrap.innerHTML = '';

      // 表示候補：件数>0 の小エリア + 選択中の中エリアに属するもの
      const mids = state.midsSelected;
      const candidates = smallMaster.filter(s => mids.has(s.middle) && (smallMap.get(s.code) || 0) > 0);

      if (!candidates.length) {
        wrap.appendChild(createEl('p', { class: 'text-sm text-coffee-600' }, '選択中の条件に合う小エリアはありません。'));
        return;
      }

      const grid = createEl('div', { class: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2' });

      candidates
        .sort((a,b)=>a.name.localeCompare(b.name,'ja'))
        .forEach(s => {
          const cnt = smallMap.get(s.code) || 0;
          const label = createEl('label', { class: 'flex items-center gap-2 rounded-xl border border-cream-300 bg-white px-3 py-2' });
          const input = createEl('input', { type: 'checkbox', class: 'rounded', checked: state.smallSelected.has(s.code), 'aria-label': s.name });
          input.addEventListener('change', (e) => {
            e.target.checked ? state.smallSelected.add(s.code) : state.smallSelected.delete(s.code);
          });
          const name = createEl('span', { class: 'text-sm' }, `${s.name}${cnt ? `（${fmt(cnt)}）` : ''}`);
          label.appendChild(input); label.appendChild(name);
          grid.appendChild(label);
        });

      wrap.appendChild(grid);
    } catch (err) {
      console.error(err);
      showToast('小エリア情報の取得に失敗しました');
    }
  }

  function renderPager({ page, total_pages }) {
    const nav = qs('#pager');
    nav.innerHTML = '';

    const makeBtn = (label, disabled, onClick, active = false, asDots = false) => {
      const el = asDots ? createEl('span', { class: 'px-2 text-coffee-500' }, label)
                        : createEl('button', {
                            type: 'button',
                            disabled: !!disabled,
                            class: 'h-10 min-w-10 px-3 rounded-xl border transition ' + (active
                              ? 'bg-coffee-800 text-white border-coffee-800'
                              : 'bg-white text-coffee-800 border-coffee-200 hover:bg-cream-200/60 disabled:opacity-40'),
                          }, label);
      if (!asDots && onClick) el.addEventListener('click', onClick);
      nav.appendChild(el);
    };

    // 前へ
    makeBtn('前へ', page <= 1, () => run(page - 1));

    // 表示するページ集合（1 … 近傍 … 最後）
    const pages = new Set([1]);
    const start = Math.max(2, page - 2);
    const end   = Math.min(total_pages - 1, page + 2);
    for (let p = start; p <= end; p++) pages.add(p);
    if (total_pages > 1) pages.add(total_pages);

    const list = [...pages].sort((a, b) => a - b);
    for (let i = 0; i < list.length; i++) {
      const p = list[i];
      if (i > 0 && list[i - 1] !== p - 1) makeBtn('…', true, null, false, true);
      makeBtn(String(p), false, () => run(p), p === page);
    }

    // 次へ
    makeBtn('次へ', page >= total_pages, () => run(page + 1));

    // 下部の情報テキスト
    let info = document.getElementById('pageInfoBottom');
    if (!info) {
      info = createEl('div', { id: 'pageInfoBottom', class: 'w-full text-center text-sm text-coffee-600 mt-2' });
      nav.after(info);
    }
    info.textContent = `${page}/${total_pages}ページ`;
  }

  // カード描画
  function renderCards(items) {
    const grid = qs('#cards');
    grid.setAttribute('aria-busy', 'false');
    grid.innerHTML = '';

    if (!items || !items.length) {
      grid.appendChild(createEl('p', { class: 'text-sm text-coffee-600' }, '条件に合うお店が見つかりませんでした。条件を緩めて再検索してください。'));
      return;
    }

    const frag = document.createDocumentFragment();
    items.forEach(s => {
      const card = createEl('article', { class: 'bg-cream-100 rounded-2xl shadow-card overflow-hidden flex flex-col h-full' });

      const img = createEl('img', {
        src: s.photo_l || 'https://placehold.co/600x450?text=Cafe',
        alt: '',
        class: 'w-full thumb',
        loading: 'lazy'
      });

      // テキスト部
      const body = createEl('div', { class: 'p-4 flex flex-col gap-2 grow' });
      const title = createEl('h3', { class: 'font-semibold text-coffee-800 line-clamp-2 min-h-[2.5rem]' }, s.name || '名称不明');
      const addr  = createEl('p', { class: 'text-sm text-coffee-700 line-clamp-2 min-h-[2.5rem]' }, s.address || '住所不明');
      const meta  = createEl('p', { class: 'text-xs text-coffee-600' }, `禁煙: ${s.non_smoking || '不明'} ／ Wi-Fi: ${s.wifi || '不明'} ／ 駐車: ${s.parking || '不明'}`);

      const linkWrap = createEl('div', { class: 'mt-auto pt-2' });
      const link = createEl('a', {
        href: s.urls_pc || '#',
        target: '_blank', rel: 'noopener',
        class: 'inline-flex items-center gap-1 text-sm text-white bg-coffee-600 hover:bg-coffee-700 px-3 py-1.5 rounded-lg'
      }, 'HotPepperで見る');

      linkWrap.appendChild(link);
      body.appendChild(title); body.appendChild(addr); body.appendChild(meta); body.appendChild(linkWrap);
      card.appendChild(img); card.appendChild(body);
      frag.appendChild(card);
    });
    grid.appendChild(frag);
  }

  // 件数表示の更新
  function updateSummaries(total, page, total_pages) {
    [document.getElementById('summaryTop'), document.getElementById('headerSummary')]
      .filter(Boolean)
      .forEach(el => { el.textContent = `該当: ${fmt(total)} 件（${page} / ${total_pages}）`; });
  }

  // =============================
  // 検索の実行
  // =============================
  async function run(page = 1) {
    try {
      state.page = page;
      writeStateToURL();
      setLoadingCards();

      const j = await fetchSearch(page);
      updateSummaries(j.total, j.page, j.total_pages);
      renderPager({ page: j.page, total_pages: j.total_pages });
      renderCards(j.items || []);
    } catch (err) {
      if (err?.name === 'AbortError') return; // 古いリクエストの中断
      console.error(err);
      showToast('検索に失敗しました。時間をおいて再度お試しください。');
      qs('#cards').setAttribute('aria-busy', 'false');
    }
  }

  // =============================
  // 起動処理
  // =============================
  async function boot() {
    // URL -> 状態 同期
    readStateFromURL();

    // マスタ取得
    const areasResp = await fetch(`${API_BASE}/areas`);
    if (!areasResp.ok) {
      showToast('エリアマスタの取得に失敗しました');
      return;
    }
    const areas = await areasResp.json();
    middleMaster = areas.middle || [];
    smallMaster  = (areas.small || []).map(s => ({ ...s, middle: s.middle || s.mcode || s.mid || '' }));

    // UIへ初期状態を反映
    qs('#parking').value = state.parking;
    qs('#smoking').value = state.smoking;

    await renderMidChips();
    await renderSmallPanels();
    await run(state.page);
  }

  // =============================
  // イベント: 入力変更
  // =============================
  const handleFilterChange = async () => {
    state.page = 1; // フィルタ変更時は1ページ目へ
    writeStateToURL();
    await renderMidChips();
    await renderSmallPanels();
  };

  // 過剰なAPI呼び出しを防ぐため、簡易デバウンス
  let debounceTimer = null;
  const debounce = (fn, ms = 200) => (...args) => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => fn(...args), ms);
  };

  // イベント登録
  qs('#search').addEventListener('click', () => run(1));
  qs('#parking').addEventListener('change', () => { state.parking = qs('#parking').value; debounce(handleFilterChange)(); });
  qs('#smoking').addEventListener('change', () => { state.smoking = qs('#smoking').value; debounce(handleFilterChange)(); });

  // 初期化
  boot();
})();
</script>

</body>
</html>
